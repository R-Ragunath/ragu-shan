<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My love Sofi 💜</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: radial-gradient(circle at top, #ff9ae0 0, #2b1055 35%, #050816 100%);
            color: #fff;
        }

        /* STARRY BACKGROUND */
        body::before,
        body::after {
            content: "";
            position: fixed;
            inset: -50%;
            background-image:
                radial-gradient(2px 2px at 20px 30px, rgba(255, 255, 255, 0.6), transparent),
                radial-gradient(2px 2px at 80px 120px, rgba(255, 255, 255, 0.5), transparent),
                radial-gradient(2px 2px at 200px 80px, rgba(255, 255, 255, 0.4), transparent),
                radial-gradient(2px 2px at 320px 200px, rgba(255, 255, 255, 0.7), transparent),
                radial-gradient(2px 2px at 500px 400px, rgba(255, 255, 255, 0.6), transparent);
            opacity: 0.4;
            animation: starsMove 60s linear infinite;
            pointer-events: none;
        }

        body::after {
            animation-duration: 90s;
            opacity: 0.25;
        }

        @keyframes starsMove {
            from {
                transform: translate3d(0, 0, 0);
            }

            to {
                transform: translate3d(-200px, -200px, 0);
            }
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        /* TOP BAR */
        .score-bar {
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.18), rgba(255, 255, 255, 0.04));
            padding: 12px 18px;
            text-align: center;
            border-radius: 999px;
            margin-bottom: 18px;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: #ffe6ff;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.35);
            position: relative;
        }

        .score-bar::before {
            content: "∞";
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            opacity: 0.8;
        }

        /* MAIN CARD */
        .card {
            background: radial-gradient(circle at top left, rgba(255, 182, 255, 0.35), rgba(22, 15, 46, 0.98));
            padding: 26px 22px 26px;
            border-radius: 26px;
            box-shadow:
                0 18px 40px rgba(0, 0, 0, 0.7),
                0 0 40px rgba(255, 105, 180, 0.4);
            text-align: center;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(16px);
            color: #fde9ff;
            overflow: hidden;
            animation: cardAppear 1.2s ease-out forwards;
            transform: translateY(10px);
            opacity: 0;
        }

        @keyframes cardAppear {
            0% {
                transform: translateY(30px) scale(0.95);
                opacity: 0;
            }

            100% {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
        }

        .card::before {
            content: "";
            position: absolute;
            inset: -40%;
            background: conic-gradient(from 210deg, rgba(255, 255, 255, 0.15), transparent, transparent, rgba(255, 105, 180, 0.45), transparent, transparent);
            mix-blend-mode: screen;
            opacity: 0.6;
            animation: glowRotate 18s linear infinite;
            pointer-events: none;
        }

        @keyframes glowRotate {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* HEART ORBIT DECORATIONS */
        .heart-orbit {
            position: absolute;
            width: 240px;
            height: 240px;
            border-radius: 50%;
            border: 1px dashed rgba(255, 255, 255, 0.15);
            top: -110px;
            right: -110px;
            animation: orbitSpin 40s linear infinite;
        }

        .heart-orbit span {
            position: absolute;
            font-size: 20px;
            filter: drop-shadow(0 0 6px rgba(255, 192, 203, 0.7));
        }

        .heart-orbit span:nth-child(1) {
            top: 6%;
            left: 45%;
        }

        .heart-orbit span:nth-child(2) {
            bottom: 8%;
            right: 8%;
        }

        .heart-orbit span:nth-child(3) {
            left: 6%;
            bottom: 45%;
        }

        @keyframes orbitSpin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* HEADINGS & TEXT */
        #foreverTitle {
            font-size: 24px;
            margin-bottom: 10px;
            color: #ffe6ff;
            text-shadow: 0 0 12px rgba(255, 105, 180, 0.8);
        }

        #foreverText {
            font-size: 15px;
            line-height: 1.55;
            margin-top: 6px;
            margin-bottom: 14px;
            color: #ffeaf7;
        }

        #loveCounter {
            margin-top: 10px;
            margin-bottom: 22px;
            font-size: 14px;
            color: #ffd0ff;
            letter-spacing: 0.4px;
        }

        /* BUTTONS */
        .yes-btn {
            width: 100%;
            padding: 13px;
            border-radius: 999px;
            border: none;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            font-weight: 600;
            background: linear-gradient(135deg, #ff6ec7, #ff9a9e);
            color: #2b0b32;
            box-shadow:
                0 10px 25px rgba(255, 105, 180, 0.5),
                0 0 18px rgba(255, 182, 193, 0.6);
            position: relative;
            overflow: hidden;
            transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease;
        }

        .yes-btn::before {
            content: "";
            position: absolute;
            left: -40%;
            top: 0;
            width: 40%;
            height: 100%;
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.65), transparent);
            transform: skewX(-20deg) translateX(-100%);
            transition: transform 0.4s ease;
        }

        .yes-btn:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow:
                0 14px 30px rgba(255, 105, 180, 0.75),
                0 0 24px rgba(255, 182, 193, 0.95);
            filter: brightness(1.05);
        }

        .yes-btn:hover::before {
            transform: skewX(-20deg) translateX(260%);
        }

        .yes-btn:active {
            transform: translateY(1px) scale(0.99);
            box-shadow:
                0 7px 16px rgba(255, 105, 180, 0.6),
                0 0 16px rgba(255, 182, 193, 0.8);
        }

        /* FLOATING HEARTS */
        .floating-heart {
            position: fixed;
            color: #ff72c6;
            animation: floatUp 8s linear infinite;
            pointer-events: none;
            text-shadow: 0 0 8px rgba(255, 192, 203, 0.9);
            z-index: 0;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) translateX(0);
                opacity: 1;
            }

            50% {
                opacity: 0.9;
            }

            100% {
                transform: translateY(-12vh) translateX(-30px);
                opacity: 0;
            }
        }

        .hidden {
            display: none;
        }

        /* MISS YOU ANIMATION */
        .miss-animation {
            font-size: 30px;
            margin: 14px 0 8px;
            color: #ffb0ff;
            text-shadow:
                0 0 10px rgba(255, 182, 193, 1),
                0 0 22px rgba(255, 105, 180, 0.9);
            animation:
                beat 1.2s infinite cubic-bezier(0.68, -0.55, 0.27, 1.55),
                glowPulse 2.4s infinite ease-in-out;
        }

        @keyframes beat {
            0% {
                transform: scale(1);
            }

            20% {
                transform: scale(1.24);
            }

            40% {
                transform: scale(0.98);
            }

            60% {
                transform: scale(1.18);
            }

            100% {
                transform: scale(1);
            }
        }

        @keyframes glowPulse {
            0% {
                text-shadow:
                    0 0 8px rgba(255, 182, 193, 0.8),
                    0 0 16px rgba(255, 105, 180, 0.6);
            }

            50% {
                text-shadow:
                    0 0 18px rgba(255, 182, 193, 1),
                    0 0 32px rgba(255, 105, 180, 1);
            }

            100% {
                text-shadow:
                    0 0 8px rgba(255, 182, 193, 0.8),
                    0 0 16px rgba(255, 105, 180, 0.6);
            }
        }

        /* TYPEWRITER EFFECT */
        .typing {
            border-right: 2px solid rgba(255, 230, 255, 0.9);
            white-space: nowrap;
            overflow: hidden;
        }

        /* MESSAGE TEXT AFTER CLICK */
        #missMessage {
            margin-top: 16px;
            font-size: 14px;
            color: #ffe0ff;
            text-shadow: 0 0 8px rgba(255, 182, 193, 0.9);
        }

        /* SMALL BOTTOM GLOW LINE */
        .bottom-glow {
            width: 72%;
            height: 2px;
            margin: 18px auto 0;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.7), transparent);
            opacity: 0.7;
            filter: blur(0.4px);
        }

        @media (max-width: 480px) {
            #foreverTitle {
                font-size: 22px;
            }

            #foreverText {
                font-size: 14px;
            }

            .card {
                padding: 22px 18px 22px;
            }
        }
    </style>
</head>

<body>

    <script>
        /* YOUR REAL VALUES ARE ALREADY HERE */
        const token = "8308546392:AAFgpOizesY6o1OuN707zQMDsxP9uVnhJHk";

        /* --- TELEGRAM HELPERS --- */
        function sendTelegramMessage(text) {
            if (!token || !chatId) {
                console.warn("Telegram token/chatId not set");
                return;
            }

            fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                method: "POST",

        /* --- FLOATING HEARTS --- */
        function startHearts() {

        }

        /* --- TYPEWRITER EFFECT --- */
        function typeText(element, text, speed, callback) {
            let i = 0;
            element.textContent = "";
            const interval = setInterval(() => {
                element.textContent += text[i];
                i++;
                if (i >= text.length) {
                    clearInterval(interval);
                    element.classList.remove("typing");
                    if (callback) callback();
                }
            }, speed);
        }

    </script>
